<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Pacientes - Soma Clinic</title>

<style>
body{
    font-family: Arial, sans-serif;
    background:#f2f6f9;
    margin:0;
}

header{
    background:#1b5e7a;
    color:white;
    padding:20px;
    text-align:center;
}

.container{
    max-width:700px;
    margin:20px auto;
    background:white;
    padding:20px;
    border-radius:12px;
}

input, select, textarea{
    width:100%;
    padding:10px;
    margin:8px 0;
    box-sizing:border-box;
}

button{
    width:100%;
    padding:12px;
    background:#1b5e7a;
    color:white;
    border:none;
    border-radius:8px;
    font-size:16px;
}

h2{
    color:#1b5e7a;
}
</style>

</head>

<body>

<header>
<h1>🏥 SOMA CLINIC</h1>
<p>Registro de pacientes</p>
</header>


<div class="container">

<h2>Datos del paciente</h2>

<label>Nombres</label>
<input type="text" placeholder="Nombres">

<label>Apellidos</label>
<input type="text" placeholder="Apellidos">

<label>Fecha de nacimiento</label>
<input type="date">

<label>Sexo</label>
<select>
<option>Seleccione</option>
<option>Femenino</option>
<option>Masculino</option>
</select>

<label>Teléfono</label>
<input type="text" placeholder="Teléfono">

<label>Dirección</label>
<textarea placeholder="Dirección"></textarea>

<label>Ocupación</label>
<input type="text" placeholder="Ocupación">


<button>
💾 Guardar paciente
</button>


</div>

</body>
</html>
